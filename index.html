function resultWinners(counts){const max=Math.max(counts.A,counts.B,counts.C,counts.D,counts.E);return Object.keys(counts).filter(k=>counts[k]===max)}
function showResult(){removePrematureShareCards();const counts={A:0,B:0,C:0,D:0,E:0};for(let i=0;i<questions.length;i++){const s=document.querySelector(`input[name="q${i}"]:checked`);if(!s){alert(`第 ${i+1} 題還沒有作答喔！請完成所有題目後再查看結果。`);return}counts[s.value]++}const winners=resultWinners(counts);currentShareRoleKey=winners[0];const r=roles[currentShareRoleKey];const title=winners.length>1?"你具有混合型韌力特質":`你的韌力角色是：${r.emoji} ${r.name}`;const desc=winners.length>1?"你的最高分出現並列，代表你不只一種韌力特質明顯。下方會顯示並列角色卡，你可以選擇最貼近目前狀態的一張下載分享。":"這是你目前最常使用的職場韌力方式。";const score=`<div class="score-table"><div class="score-cell">A 港灣型<br>${counts.A} 次</div><div class="score-cell">B 燈塔型<br>${counts.B} 次</div><div class="score-cell">C 海風型<br>${counts.C} 次</div><div class="score-cell">D 珊瑚型<br>${counts.D} 次</div><div class="score-cell">E 浪花型<br>${counts.E} 次</div></div>`;const official=winners.map(k=>officialPanel(k)).join("");const cards=winners.map(roleCard).join("");const result=document.getElementById("result");result.style.display="block";result.innerHTML=`<h2>${title}</h2><div class="complete-text"><strong>恭喜你完成「韌力角色心理測驗」！</strong><br>每一種韌力都沒有高低之分。<br>有些人像港灣，讓人安心；有些人像燈塔，帶來方向；有些人像海風，懂得轉換；有些人像珊瑚，建立支持；有些人像浪花，敏銳覺察。</div><p>${desc}</p>${score}${official}${cards}<div class="notice">※本測驗僅供健康促進活動、自我覺察及友善職場宣導使用，非心理診斷工具。</div>`;result.scrollIntoView({behavior:"smooth",block:"start"})}
function officialPanel(k){const r=roles[k];return `<div class="share-panel"><h3>${r.emoji} ${r.name}｜角色卡與分享圖</h3><div>你可以直接分享或下載含測驗連結 QR Code 的分享圖卡，也可以下載官方角色圖卡。</div><div class="share-layout"><div class="official-card">${smartImgHTML(k,"official-img",r.name+"角色卡")}<div class="tool-buttons"><button class="tool-main" type="button" onclick="downloadOfficialCard('${k}')">下載官方角色卡</button></div></div><div class="share-card" id="share-${k}">${smartImgHTML(k,"thumb",r.name+"縮圖")}<div><h4>${r.emoji} 我的韌力角色：${r.name}</h4><p><strong>你是：</strong>${r.youAre}</p><p><strong>今日韌力提醒：</strong>「${r.reminder}」</p><div class="qr-row"><img src="${QR_DATA_URL}" alt="測驗QR Code"><div><strong>掃碼測測你的職場韌力角色</strong><br><small>高雄市政府115年度EAP韌力角色卡</small></div></div><div class="tool-buttons"><button class="tool-main" type="button" onclick="sharePoster('${k}')">直接分享圖卡</button><button class="tool-alt" type="button" onclick="downloadSharePoster('${k}')">下載圖檔</button><button class="tool-alt" type="button" onclick="copyQuizLink()">複製測驗連結</button></div></div></div></div></div>`}
function firstPath(k){return roles[k].cards[0]}
function downloadOfficialCard(k){const a=document.createElement("a");a.href=firstPath(k);a.download=roles[k].name+"角色卡.png";document.body.appendChild(a);a.click();a.remove()}
function loadImage(src){return new Promise((res,rej)=>{const img=new Image();img.crossOrigin="anonymous";img.onload=()=>res(img);img.onerror=rej;img.src=src})}
async function loadAny(paths){for(const p of paths){try{return {img:await loadImage(p),path:p}}catch(e){}}return null}
function wrap(ctx,text,x,y,w,lh,max){const chars=Array.from(text);let line="",lines=[];for(const ch of chars){const t=line+ch;if(ctx.measureText(t).width>w&&line){lines.push(line);line=ch}else line=t}if(line)lines.push(line);if(max&&lines.length>max){lines=lines.slice(0,max);lines[max-1]=lines[max-1]+"…"}lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lh))}
function posterCanvas(k){return (async()=>{const r=roles[k];const found=await loadAny(r.cards);if(!found){alert("找不到可用的角色卡圖片。請確認 cards 資料夾內的 PNG 已正確上傳，而且不是空白檔案。");return null}const W=900,H=560,cv=document.createElement("canvas"),ctx=cv.getContext("2d");cv.width=W*2;cv.height=H*2;ctx.scale(2,2);const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,"#fffaf3");g.addColorStop(1,"#eef8f8");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle="#ffffffcc";round(ctx,24,24,W-48,H-48,28);ctx.fill();ctx.drawImage(found.img,54,54,260,400);ctx.fillStyle=r.color;ctx.font='900 42px "Microsoft JhengHei",sans-serif';ctx.fillText(`我的韌力角色：${r.name}`,350,90);ctx.fillStyle="#443832";ctx.font='800 24px "Microsoft JhengHei",sans-serif';wrap(ctx,`你是：${r.youAre}`,350,135,480,34,2);ctx.fillStyle="#5d544d";ctx.font='20px "Microsoft JhengHei",sans-serif';wrap(ctx,r.trait,350,210,480,30,4);ctx.fillStyle="#2f7f8f";ctx.font='900 24px "Microsoft JhengHei",sans-serif';wrap(ctx,`今日韌力提醒：「${r.reminder}」`,350,350,480,34,2);const qr=await loadImage(QR_DATA_URL);ctx.drawImage(qr,650,405,120,120);ctx.fillStyle="#443832";ctx.font='800 18px "Microsoft JhengHei",sans-serif';ctx.fillText("掃碼測測你的職場韌力角色",350,445);ctx.font='16px "Microsoft JhengHei",sans-serif';ctx.fillText("高雄市政府115年度EAP韌力角色卡",350,480);return cv})()}
function canvasToBlob(cv){return new Promise(res=>cv.toBlob(res,"image/png"))}
async function downloadSharePoster(k){const cv=await posterCanvas(k);if(!cv)return;const a=document.createElement("a");a.href=cv.toDataURL("image/png");a.download=roles[k].name+"分享圖卡.png";a.click()}
async function sharePoster(k){const cv=await posterCanvas(k);if(!cv)return;const blob=await canvasToBlob(cv);const file=new File([blob],roles[k].name+"分享圖卡.png",{type:"image/png"});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:roles[k].name+"分享圖卡",text:"我的職場韌力角色是"+roles[k].name+"，一起來測測你的職場韌力角色！"});return}await downloadSharePoster(k);copyQuizLink();alert("此瀏覽器不支援直接分享圖片，已改為下載圖檔並複製測驗連結。")}
function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
async function copyQuizLink(){try{await navigator.clipboard.writeText(QUIZ_URL);alert("測驗連結已複製！")}catch(e){alert("請手動複製："+QUIZ_URL)}}
function resetQuiz(){removePrematureShareCards();document.querySelectorAll("input[type='radio']").forEach(i=>i.checked=false);document.querySelectorAll(".option").forEach(el=>el.classList.remove("selected"));const r=document.getElementById("result");r.style.display="none";r.innerHTML="";window.scrollTo({top:0,behavior:"smooth"})}
document.getElementById("showResultBtn").addEventListener("click",showResult);document.getElementById("resetBtn").addEventListener("click",resetQuiz);removePrematureShareCards();renderQuiz();
</script>
</body>
</html>
