function roleCard(key){const r=roles[key];return `<article class="role-card"><div class="role-top"><div class="emoji">${r.emoji}</div><div><h3>角色卡｜${r.name}</h3><p class="you-are">你是：${r.youAre}</p></div></div><div class="section"><strong>角色特質</strong><br>${r.trait}</div><div class="section"><strong>你的韌力來源</strong><br>${r.source}</div><div class="section"><strong>容易遇到的壓力</strong><br>${r.pressure}</div><div class="reminder">今日韌力提醒<br>「${r.reminder}」</div><div class="section"><strong>友善職場行動</strong><br>${r.action}</div></article>`}
function buildResultData(winners){if(winners.length>1){return{isTie:true,winners,role:null,titleText:"🌈 混合型韌力特質",descText:"你同時擁有不只一種明顯的韌力方式，代表你在不同情境下，會靈活運用不同力量讓自己重新站穩。",reminderText:"我擁有多種面對壓力的力量，現在的我，已經很好。",bgStyle:"linear-gradient(135deg,#fff6ef 0%,#eef8ff 45%,#eefaf4 100%)",accent:"#8a94c9"}}const role=roles[winners[0]];return{isTie:false,winners,role,titleText:`${role.emoji} ${role.name}`,descText:`${role.youAre}。${role.trait}`,reminderText:role.reminder,bgStyle:role.bg,accent:role.accent}}
function shareCardHTML(data){const winnerBadges=data.winners.map(k=>{const w=roles[k];return `<span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.72);padding:6px 10px;border-radius:999px;font-size:14px;font-weight:800;margin:4px 4px 0 0;">${w.emoji} ${w.name}</span>`}).join("");return `<div id="shareCard" class="share-card" style="background:${data.bgStyle};"><div class="share-card-inner"><div class="share-left"><div class="share-top-badge">暖洋心理韌性檢測站</div><div class="share-title">你是哪一種職場韌力角色？</div><div class="share-subtitle">面對壓力時，你最常用哪種方式讓自己重新站穩？</div><div class="share-role-box" style="box-shadow: inset 0 0 0 2px ${data.accent}22;"><div class="share-role-line">我的測驗結果</div><div class="share-role-name">${data.titleText}</div><div class="share-role-desc">${data.descText}</div>${data.isTie?`<div style="margin-top:10px;">${winnerBadges}</div>`:""}</div><div class="share-reminder-box"><div class="share-reminder-label">今日韌力提醒</div><div class="share-reminder-text">「${data.reminderText}」</div></div></div><div class="share-right"><div><div class="share-emoji">${data.isTie?"🌈":data.role.emoji}</div><div class="share-tagline">${data.isTie?"你具有混合型韌力特質":`你是：${data.role.youAre}`}</div></div><div><div class="qr-box"><img class="qr-img" src="${QR_DATA_URL}" alt="測驗 QR Code"></div><div class="qr-caption">掃碼測測你的職場韌力角色</div></div><div class="share-footer">高雄市政府 115 年員工協助方案<br>本測驗僅供健康促進與自我覺察使用</div></div></div></div>`}
function showResult(){const counts={A:0,B:0,C:0,D:0,E:0};for(let i=0;i<questions.length;i++){const selected=document.querySelector(`input[name="q${i}"]:checked`);if(!selected){alert(`第 ${i+1} 題還沒有作答喔！請完成所有題目後再查看結果。`);return}counts[selected.value]++}const max=Math.max(counts.A,counts.B,counts.C,counts.D,counts.E);const winners=Object.keys(counts).filter(key=>counts[key]===max);const resultData=buildResultData(winners);const scoreTable=`<div class="score-table"><div class="score-cell">A 港灣型<br>${counts.A} 次</div><div class="score-cell">B 燈塔型<br>${counts.B} 次</div><div class="score-cell">C 海風型<br>${counts.C} 次</div><div class="score-cell">D 珊瑚型<br>${counts.D} 次</div><div class="score-cell">E 浪花型<br>${counts.E} 次</div></div>`;const pageTitle=resultData.isTie?"你具有混合型韌力特質":`你的韌力角色是：${resultData.role.emoji} ${resultData.role.name}`;const description=resultData.isTie?"你的最高分出現並列，代表你不只一種韌力特質明顯。你可以選擇最貼近目前狀態的一張角色卡，也可以把這些力量一起帶回工作與生活中。":"這是你目前最常使用的職場韌力方式。";const cards=winners.map(roleCard).join("");const result=document.getElementById("result");result.style.display="block";result.innerHTML=`<h2>${pageTitle}</h2><div class="complete-text"><strong>恭喜你完成「韌力角色心理測驗」！</strong><br>每一種韌力都沒有高低之分。<br>有些人像港灣，讓人安心；有些人像燈塔，帶來方向；有些人像海風，懂得轉換；有些人像珊瑚，建立支持；有些人像浪花，敏銳覺察。</div><p>${description}</p>${scoreTable}${cards}<div class="share-panel"><h3>分享我的測驗結果</h3><div>可直接下載分享圖卡，或用手機分享給同仁；圖卡中已內嵌測驗 QR Code。</div><div class="share-buttons"><button class="share-btn" type="button" id="downloadCardBtn">下載分享圖卡 PNG</button><button class="share-btn" type="button" id="shareCardBtn">手機分享圖卡</button><button class="share-btn-light" type="button" id="copyLinkBtn">複製測驗連結</button></div><div class="share-preview-wrap">${shareCardHTML(resultData)}</div></div><div class="notice">※本測驗僅供健康促進活動、自我覺察及友善職場宣導使用，非心理診斷工具。若近期壓力、失眠、焦慮或低落情形持續影響生活，建議主動尋求可信任的人或專業資源協助。</div>`;document.getElementById("downloadCardBtn").addEventListener("click",downloadShareCard);document.getElementById("shareCardBtn").addEventListener("click",shareCard);document.getElementById("copyLinkBtn").addEventListener("click",copyQuizLink);result.scrollIntoView({behavior:"smooth",block:"start"})}
function getStyleText(){return Array.from(document.querySelectorAll("style")).map(style=>style.textContent).join("\n")}
function elementToPngDataUrl(node, scale=2){return new Promise((resolve,reject)=>{const width=node.offsetWidth;const height=node.offsetHeight;const html=`<style>${getStyleText()}</style>${node.outerHTML}`;const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${width*scale}" height="${height*scale}" viewBox="0 0 ${width} ${height}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${html}</div></foreignObject></svg>`;const blob=new Blob([svg],{type:"image/svg+xml;charset=utf-8"});const url=URL.createObjectURL(blob);const img=new Image();img.onload=()=>{try{const canvas=document.createElement("canvas");canvas.width=width*scale;canvas.height=height*scale;const ctx=canvas.getContext("2d");ctx.scale(scale,scale);ctx.drawImage(img,0,0);URL.revokeObjectURL(url);resolve(canvas.toDataURL("image/png"))}catch(e){URL.revokeObjectURL(url);reject(e)}};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("圖卡轉換失敗"))};img.src=url})}
async function downloadShareCard(){const node=document.getElementById("shareCard");if(!node){alert("請先完成測驗並產生結果圖卡。");return}try{const dataUrl=await elementToPngDataUrl(node,2);const link=document.createElement("a");link.download="韌力角色分享圖卡.png";link.href=dataUrl;link.click()}catch(error){console.error(error);alert("圖卡產生失敗，請改用截圖，或換 Chrome / Edge 瀏覽器再試。")}}
async function shareCard(){const node=document.getElementById("shareCard");if(!node){alert("請先完成測驗並產生結果圖卡。");return}try{const dataUrl=await elementToPngDataUrl(node,2);const response=await fetch(dataUrl);const blob=await response.blob();const file=new File([blob],"韌力角色分享圖卡.png",{type:"image/png"});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({title:"你是哪一種職場韌力角色？",text:"我剛完成韌力角色心理測驗，快來測測看！",files:[file]})}else{alert("此裝置或瀏覽器不支援直接分享圖卡，請改用「下載分享圖卡 PNG」。")}}catch(error){console.error(error);alert("分享圖卡時發生問題，請改用「下載分享圖卡 PNG」。")}}
async function copyQuizLink(){try{await navigator.clipboard.writeText(QUIZ_URL);alert("測驗連結已複製！")}catch(error){alert("無法自動複製，請手動複製此網址：\n"+QUIZ_URL)}}
function resetQuiz(){document.querySelectorAll("input[type='radio']").forEach(input=>input.checked=false);document.querySelectorAll(".option").forEach(el=>el.classList.remove("selected"));const result=document.getElementById("result");result.style.display="none";result.innerHTML="";window.scrollTo({top:0,behavior:"smooth"})}
initPage();
</script>
</body>
</html>
